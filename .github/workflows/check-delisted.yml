name: Check Liked Properties

on:
  schedule:
    # 1日3回: 8:00, 14:00, 20:00 JST (UTC 23:00前日, 05:00, 11:00)
    - cron: '0 23 * * *'
    - cron: '0 5 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check liked properties
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_delisted.py

      - name: Commit delisted changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json || true
          git diff --cached --quiet || git commit -m "chore: mark delisted properties $(date +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push || true

      - name: Deploy to Cloudflare Pages
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          packageManager: 'npm'
          wranglerVersion: '3.78.12'
          command: pages deploy docs --project-name bukken-dashboard --commit-dirty=true
