name: Sync Likes

on:
  repository_dispatch:
    types: [sync-likes]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Write feedback data
        run: |
          python3 -c "
          import json
          likes = ${{ toJSON(github.event.client_payload.likes) }}
          with open('docs/likes.json', 'w') as f:
              json.dump(sorted(set(likes)), f, ensure_ascii=False, indent=2)
          print(f'Wrote {len(likes)} likes')
          "
          python3 -c "
          import json
          dislikes = ${{ toJSON(github.event.client_payload.dislikes) }}
          with open('docs/dislikes.json', 'w') as f:
              json.dump(sorted(set(dislikes)), f, ensure_ascii=False, indent=2)
          print(f'Wrote {len(dislikes)} dislikes')
          " || true
          python3 -c "
          import json
          maybes = ${{ toJSON(github.event.client_payload.maybes) }}
          with open('docs/maybes.json', 'w') as f:
              json.dump(sorted(set(maybes)), f, ensure_ascii=False, indent=2)
          print(f'Wrote {len(maybes)} maybes')
          " || true
          python3 << 'PYEOF'
          import json
          notes = ${{ toJSON(github.event.client_payload.notes) }}
          with open('docs/notes.json', 'w') as f:
              json.dump(notes, f, ensure_ascii=False, indent=2)
          print(f'Wrote {len(notes)} notes')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/likes.json docs/dislikes.json docs/maybes.json docs/notes.json
          git diff --cached --quiet || git commit -m "chore: sync feedback data ($(date +%Y-%m-%d))"
          git push
