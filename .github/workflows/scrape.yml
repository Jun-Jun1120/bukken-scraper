  name: Daily Property Scrape

  on:
    schedule:
      # 毎日 AM 7:00 JST (UTC 22:00 前日)
      - cron: '0 22 * * *'
    workflow_dispatch: # 手動実行も可能

  permissions:
    contents: write

  jobs:
    scrape:
      runs-on: ubuntu-latest
      timeout-minutes: 120

      steps:
        - uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.12'
            cache: 'pip'

        - name: Install Python dependencies
          run: pip install -r requirements.txt

        - name: Cache Playwright browsers
          uses: actions/cache@v4
          with:
            path: ~/.cache/ms-playwright
            key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

        - name: Install Playwright browser
          run: |
            if [ ! -d ~/.cache/ms-playwright/chromium-* ]; then
              playwright install chromium
              playwright install-deps
            else
              playwright install-deps
            fi

        - name: Run scraper
          env:
            GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            ATHOME_USER: ${{ secrets.ATHOME_USER }}
            ATHOME_PASS: ${{ secrets.ATHOME_PASS }}
          run: |
            python main.py --max-pages 3 --skip-scrapers "HOME'S"

        - name: Upload results
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: scrape-results-${{ github.run_number }}
            path: |
              output/data.json
              output/*.csv
              output/report.html
            retention-days: 30

        - name: Merge likes into data and update dashboard
          run: |
            python3 -c "
            import json
            from pathlib import Path
            data_path = Path('output/data.json')
            likes_path = Path('docs/likes.json')
            if data_path.exists() and likes_path.exists():
                data = json.loads(data_path.read_text())
                likes = set(json.loads(likes_path.read_text()))
                for p in data:
                    p['liked'] = p.get('url', '') in likes
                data_path.write_text(json.dumps(data, ensure_ascii=False, indent=2))
                print(f'Merged {len(likes)} likes into {len(data)} properties')
            " || true
            cp output/data.json docs/data.json || true
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/data.json || true
            git diff --cached --quiet || git commit -m "chore: update property data $(date +%Y-%m-%d)"
            git pull --rebase origin main || true
            git push

        - name: Notify new properties and delisted alerts
          env:
            DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          run: |
            python notify.py output/data.json docs/likes.json || true

        - name: Deploy to Cloudflare Pages
          uses: cloudflare/wrangler-action@v3
          with:
            apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            wranglerVersion: '3.99.0'
            command: pages deploy docs --project-name bukken-dashboard --commit-dirty=true
