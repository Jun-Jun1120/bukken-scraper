  name: Daily Property Scrape

  on:
    schedule:
      # 毎日 AM 7:00 JST (UTC 22:00 前日)
      - cron: '0 22 * * *'
    workflow_dispatch:
      inputs:
        evaluate_only:
          description: 'AI評価のみ (スクレイピングスキップ)'
          type: boolean
          default: false

  permissions:
    contents: write

  jobs:
    scrape:
      runs-on: ubuntu-latest
      timeout-minutes: 360

      steps:
        - uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.12'
            cache: 'pip'

        - name: Install Python dependencies
          run: pip install -r requirements.txt

        - name: Cache Playwright browsers
          uses: actions/cache@v4
          with:
            path: ~/.cache/ms-playwright
            key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

        - name: Install Playwright browser
          run: |
            playwright install chromium
            playwright install-deps

        - name: Run scraper
          env:
            GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            ATHOME_USER: ${{ secrets.ATHOME_USER }}
            ATHOME_PASS: ${{ secrets.ATHOME_PASS }}
          run: |
            if [ "${{ inputs.evaluate_only }}" = "true" ]; then
              python main.py --evaluate-only
            else
              python main.py --max-pages 3
            fi

        - name: Upload results
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: scrape-results-${{ github.run_number }}
            path: |
              output/data.json
              output/*.csv
              output/report.html
            retention-days: 30

        - name: Merge feedback into data and update dashboard
          run: |
            python3 -c "
            import json
            from pathlib import Path
            data_path = Path('output/data.json')
            likes_path = Path('docs/likes.json')
            dislikes_path = Path('docs/dislikes.json')
            maybes_path = Path('docs/maybes.json')
            notes_path = Path('docs/notes.json')
            if data_path.exists():
                data = json.loads(data_path.read_text())
                likes = set(json.loads(likes_path.read_text())) if likes_path.exists() else set()
                dislikes = set(json.loads(dislikes_path.read_text())) if dislikes_path.exists() else set()
                maybes = set(json.loads(maybes_path.read_text())) if maybes_path.exists() else set()
                notes = json.loads(notes_path.read_text()) if notes_path.exists() else {}
                for p in data:
                    url = p.get('url', '')
                    p['liked'] = url in likes
                    p['disliked'] = url in dislikes
                    p['maybe'] = url in maybes
                    if url in notes:
                        p['user_note'] = notes[url].get('text', '')
                data_path.write_text(json.dumps(data, ensure_ascii=False, indent=2))
                print(f'Merged feedback: {len(likes)} likes, {len(dislikes)} dislikes, {len(notes)} notes into {len(data)} properties')
            " || true
            cp output/data.json docs/data.json || true
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/data.json || true
            git diff --cached --quiet || git commit -m "chore: update property data $(date +%Y-%m-%d)"
            git pull --rebase origin main || true
            git push

        - name: Notify new properties and delisted alerts
          env:
            DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          run: |
            python notify.py output/data.json docs/likes.json || true

        - name: Deploy to Cloudflare Pages
          uses: cloudflare/wrangler-action@v3
          with:
            apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            packageManager: 'npm'
            wranglerVersion: '3.78.12'
            command: pages deploy docs --project-name bukken-dashboard --commit-dirty=true
