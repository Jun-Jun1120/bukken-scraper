<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>物件ダッシュボード</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --muted: #6e6e73;
  --border: #e5e5ea; --accent: #0071e3; --green: #34c759; --red: #ff3b30;
  --orange: #ff9500; --yellow: #ffcc00; --purple: #af52de;
  --radius: 14px; --shadow: 0 2px 8px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  background: rgba(255,255,255,.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px; position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn {
  padding: 9px 20px; border-radius: 20px; border: none; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all .2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #0077ed; transform: scale(1.02); }
.btn-primary:disabled { background: #99caff; cursor: not-allowed; transform: none; }
.btn-outline { background: rgba(0,0,0,.04); color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { background: rgba(0,0,0,.08); }
.status-text { font-size: 13px; color: var(--muted); max-width: 300px; text-align: right; }
.progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-top: 4px; display: none; }
.progress-bar.active { display: block; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s ease; }

/* Layout */
.main { max-width: 1100px; margin: 0 auto; padding: 20px; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 18px; }
.stat-card {
  background: white; padding: 14px 12px; border-radius: var(--radius);
  box-shadow: var(--shadow); text-align: center;
}
.stat-val { font-size: 24px; font-weight: 800; letter-spacing: -.5px; }
.stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* Filters */
.filters {
  background: white; border-radius: var(--radius); padding: 16px 20px;
  box-shadow: var(--shadow); margin-bottom: 14px;
}
.filters-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 12px; font-weight: 600; color: var(--muted); }
.filter-group select, .filter-group input {
  padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; background: white; color: var(--text); min-width: 100px; transition: border-color .2s;
}
.filter-group select:focus, .filter-group input:focus { outline: none; border-color: var(--accent); }
.filter-group input[type="number"] { width: 80px; }

/* Saved filters */
.saved-filters { display: flex; gap: 6px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
.saved-filters .preset-btn {
  padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border);
  background: white; font-size: 12px; cursor: pointer; transition: all .2s;
  display: inline-flex; align-items: center; gap: 4px;
}
.saved-filters .preset-btn:hover { border-color: var(--accent); background: #f0f4ff; }
.saved-filters .preset-btn.active { border-color: var(--accent); background: var(--accent); color: white; }
.saved-filters .preset-del { font-size: 10px; opacity: .5; cursor: pointer; margin-left: 2px; }
.saved-filters .preset-del:hover { opacity: 1; color: var(--red); }
.saved-filters .preset-save {
  padding: 5px 12px; border-radius: 20px; border: 1.5px dashed var(--border);
  background: transparent; font-size: 12px; cursor: pointer; color: var(--muted); transition: all .2s;
}
.saved-filters .preset-save:hover { border-color: var(--accent); color: var(--accent); }

/* View tabs (map / chart) */
.view-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
.view-tab {
  flex: 1; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius);
  background: white; font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all .2s; text-align: center; box-shadow: var(--shadow);
}
.view-tab:hover { border-color: var(--accent); color: var(--accent); }
.view-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

/* Prefs bar */
.prefs-bar {
  background: linear-gradient(135deg, #f0f7ff, #fef1f7); border-radius: var(--radius);
  padding: 12px 18px; margin-bottom: 14px; display: none; align-items: center; gap: 10px;
  box-shadow: var(--shadow);
}
.prefs-bar.visible { display: flex; }
.prefs-bar .prefs-icon { font-size: 18px; }
.prefs-bar .prefs-text { font-size: 13px; color: #4b5563; }
.prefs-bar .prefs-count { font-weight: 700; color: var(--accent); }

/* Sort + count bar */
.toolbar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.result-count { font-size: 14px; color: var(--text); font-weight: 600; }
.sort-btns { display: flex; gap: 4px; flex-wrap: wrap; }
.sort-btn {
  padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
  background: white; font-size: 13px; cursor: pointer; color: var(--muted); font-weight: 600;
  transition: all .15s;
}
.sort-btn:hover { border-color: var(--accent); color: var(--accent); }
.sort-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.per-page select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }

/* Station filter checkboxes */
.st-check { display: inline-flex; align-items: center; gap: 3px; cursor: pointer; font-size: 13px; user-select: none; }
.st-check input { margin: 0; cursor: pointer; }
.st-check .st-rank { font-size: 10px; font-weight: 800; margin-left: 1px; }
.st-check .st-count { font-size: 11px; color: var(--muted); }
.st-section { width: 100%; font-size: 11px; font-weight: 700; color: var(--muted); margin-top: 6px; padding-bottom: 2px; border-bottom: 1px solid var(--border); }
.st-section:first-child { margin-top: 0; }
.st-actions { display: flex; gap: 8px; margin-bottom: 6px; }
.st-actions button { font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; font-weight: 600; padding: 0; }
.st-actions button:hover { text-decoration: underline; }

/* Cards list */
.cards { display: flex; flex-direction: column; gap: 12px; }

/* Card */
.card {
  background: white; border-radius: var(--radius); padding: 0;
  box-shadow: var(--shadow); cursor: pointer; transition: all .2s;
  overflow: hidden; border: 1px solid transparent;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.1); border-color: var(--border); }
.card-border { height: 4px; width: 100%; }
.card-body { padding: 18px 22px; }
.card-top { display: flex; gap: 14px; align-items: start; }
.card-info { flex: 1; min-width: 0; }
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.card-name { font-size: 16px; font-weight: 700; letter-spacing: -.2px; }
.card-address { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.meta-chip {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 600;
  background: #f0f0f2; color: var(--text);
}
.meta-chip.rent { background: #fff0f0; color: var(--red); font-weight: 700; font-size: 15px; }
.card-station { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 450px; }

/* Card comment preview */
.card-comment {
  margin-top: 12px; padding-top: 12px; border-top: 1px solid #ebebed;
}
.card-pros-cons { display: flex; gap: 16px; font-size: 13px; margin-bottom: 8px; flex-wrap: wrap; }
.card-pros-cons .pro { color: #059669; font-weight: 500; }
.card-pros-cons .con { color: #dc2626; font-weight: 500; }
.card-pros-cons .pro::before { content: "\\2713 "; font-weight: 700; }
.card-pros-cons .con::before { content: "\\2717 "; font-weight: 700; }
.card-comment-text {
  font-size: 13px; color: #4b5563; line-height: 1.7;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* Score area */
.card-score-area { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; gap: 4px; min-width: 70px; }
.like-btn {
  background: none; border: none; font-size: 22px; cursor: pointer;
  padding: 2px 6px; border-radius: 50%; transition: all .2s; line-height: 1;
}
.like-btn:hover { background: #fef2f2; transform: scale(1.3); }
.like-btn.liked { color: var(--red); }
.like-btn:not(.liked) { color: #d1d5db; }
.dislike-btn {
  background: none; border: none; font-size: 16px; cursor: pointer;
  padding: 2px 6px; border-radius: 50%; transition: all .2s; line-height: 1; color: #d1d5db;
}
.dislike-btn:hover { background: #eff6ff; transform: scale(1.3); }
.dislike-btn.disliked { color: var(--accent); }
.maybe-btn {
  background: none; border: none; font-size: 18px; cursor: pointer;
  padding: 2px 6px; border-radius: 50%; transition: all .2s; line-height: 1; color: #d1d5db;
}
.maybe-btn:hover { background: #fffbeb; transform: scale(1.3); }
.maybe-btn.maybed { color: var(--orange); }
.reaction-row { display: flex; gap: 2px; justify-content: center; }
.score-circle {
  width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  flex-direction: column; font-weight: 800; font-size: 22px; line-height: 1;
}
.score-circle small { font-size: 10px; font-weight: 600; opacity: .6; }
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 6px;
  font-size: 12px; font-weight: 700; white-space: nowrap;
}
.station-rank {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 800; letter-spacing: .3px;
}
.rank-S { background: #fef3c7; color: #92400e; }
.rank-A { background: #dbeafe; color: #1e40af; }
.rank-B { background: #e5e7eb; color: #374151; }
.rank-C { background: #f3f4f6; color: #9ca3af; }

/* Card image */
.card-img {
  width: 110px; height: 82px; object-fit: cover; border-radius: 10px;
  flex-shrink: 0; background: var(--bg);
}
.card-img-placeholder {
  width: 110px; height: 82px; border-radius: 10px; flex-shrink: 0;
  background: #f0f0f2; display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 24px;
}

/* Detail modal */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200;
  display: none; align-items: start; justify-content: center; padding: 40px 20px;
  overflow-y: auto; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.overlay.open { display: flex; }
.detail {
  background: white; border-radius: 20px; max-width: 760px; width: 100%;
  padding: 32px; position: relative; animation: slideUp .25s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.detail-close {
  position: absolute; top: 16px; right: 16px; background: var(--bg);
  border: none; width: 36px; height: 36px; border-radius: 50%;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.detail-close:hover { background: #e5e5ea; }
.detail h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; padding-right: 40px; letter-spacing: -.3px; }
.detail .address { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
.detail-img {
  width: 100%; max-height: 300px; object-fit: cover; border-radius: 14px;
  margin-bottom: 16px; background: var(--bg);
}
.detail-score-bar {
  display: flex; align-items: center; gap: 20px; padding: 20px;
  border-radius: 14px; margin-bottom: 20px;
}
.detail-score { font-size: 52px; font-weight: 800; line-height: 1; letter-spacing: -1px; }
.detail-score-max { font-size: 16px; color: var(--muted); }

.detail-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px; margin-bottom: 20px;
}
.detail-item {
  padding: 10px 12px; background: #fafafa; border-radius: 10px;
}
.detail-item .d-label { font-size: 12px; color: var(--muted); font-weight: 600; }
.detail-item .d-value { font-size: 16px; font-weight: 700; margin-top: 4px; }
.detail-item .d-value.total { color: var(--red); }
.detail-station { font-size: 14px; color: #374151; margin-bottom: 16px; padding: 12px 16px; background: #fafafa; border-radius: 10px; line-height: 1.6; }
.detail-features { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.detail-features .tag { background: #f0f0f2; padding: 5px 12px; border-radius: 8px; font-size: 13px; color: #374151; }

/* Pros / Cons - much better visibility */
.detail-eval { margin-bottom: 20px; }
.detail-eval h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; letter-spacing: -.2px; }
.detail-pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.pros-card, .cons-card {
  padding: 14px 16px; border-radius: 12px;
}
.pros-card { background: #f0fdf4; border: 1px solid #bbf7d0; }
.cons-card { background: #fef2f2; border: 1px solid #fecaca; }
.pros-card h4 { font-size: 14px; color: #166534; margin-bottom: 10px; font-weight: 700; }
.cons-card h4 { font-size: 14px; color: #991b1b; margin-bottom: 10px; font-weight: 700; }
.pros-card ul, .cons-card ul { list-style: none; }
.pros-card li { color: #15803d; font-size: 14px; padding: 4px 0; line-height: 1.6; }
.cons-card li { color: #b91c1c; font-size: 14px; padding: 4px 0; line-height: 1.6; }
.pros-card li::before { content: "\2713\00a0"; font-weight: 700; }
.cons-card li::before { content: "\2717\00a0"; font-weight: 700; }

/* AI Comment - prominent */
.detail-comment {
  padding: 20px 22px; border-radius: 14px; font-size: 15px;
  line-height: 1.8; color: #1f2937; margin-bottom: 24px;
  border-left: 4px solid var(--accent); background: #f8fafc;
}
.detail-comment-label {
  font-size: 12px; font-weight: 700; color: var(--accent);
  margin-bottom: 8px;
}
.detail-link { text-align: right; }
.detail-link a {
  display: inline-block; padding: 10px 20px; border-radius: 10px;
  background: var(--accent); color: white; text-decoration: none; font-weight: 600; font-size: 14px;
  transition: background .2s;
}
.detail-link a:hover { background: #0077ed; }
.source-badge {
  display: inline-block; padding: 3px 10px; border-radius: 6px;
  font-size: 12px; font-weight: 700; letter-spacing: .3px;
}

/* Pagination */
.pagination { display: flex; justify-content: center; gap: 4px; margin-top: 20px; }
.page-btn {
  padding: 6px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  background: white; cursor: pointer; font-size: 13px; transition: all .15s;
}
.page-btn:hover { border-color: var(--accent); }
.page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.page-btn:disabled { opacity: .3; cursor: not-allowed; }

/* Empty state */
.empty { text-align: center; padding: 80px 20px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty p { font-size: 14px; }

/* Initial Cost Calculator */
.cost-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
.cost-table th, .cost-table td { padding: 10px 14px; text-align: left; font-size: 14px; border-bottom: 1px solid var(--border); }
.cost-table th { color: var(--muted); font-weight: 600; font-size: 13px; width: 40%; }
.cost-table td { font-weight: 600; text-align: right; }
.cost-table tr.cost-total td { font-size: 18px; font-weight: 800; color: var(--red); border-top: 2px solid var(--text); }
.cost-table tr.cost-total th { font-size: 14px; font-weight: 700; border-top: 2px solid var(--text); }
.cost-config { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.cost-config label { font-size: 12px; color: var(--muted); font-weight: 600; display: flex; flex-direction: column; gap: 4px; }
.cost-config input { padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; width: 120px; }
.cost-section { background: #fafafa; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
.cost-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }

/* Property Notes */
.notes-section { margin-bottom: 20px; }
.notes-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.notes-textarea { width: 100%; min-height: 80px; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; resize: vertical; transition: border-color .2s; }
.notes-textarea:focus { outline: none; border-color: var(--accent); }
.status-chips { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.status-chip { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
.status-chip:hover { border-color: var(--accent); background: #f0f4ff; }
.status-chip.active { background: var(--accent); color: white; border-color: var(--accent); }
.note-icon { font-size: 12px; margin-left: 4px; color: var(--accent); }

/* Comparison */
.compare-check { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); cursor: pointer; font-weight: 600; user-select: none; }
.compare-check input { margin: 0; cursor: pointer; }
.compare-fab { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 14px 32px; border-radius: 30px; background: var(--accent); color: white; font-size: 15px; font-weight: 700; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(0,113,227,.4); z-index: 150; transition: all .2s; display: none; }
.compare-fab:hover { transform: translateX(-50%) scale(1.05); box-shadow: 0 6px 28px rgba(0,113,227,.5); }
.compare-overlay { position: fixed; inset: 0; background: rgba(255,255,255,.97); z-index: 300; display: none; flex-direction: column; overflow: hidden; }
.compare-overlay.open { display: flex; }
.compare-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.compare-header h2 { font-size: 20px; font-weight: 700; }
.compare-body { flex: 1; overflow: auto; padding: 20px; }
.compare-table { border-collapse: collapse; min-width: 100%; }
.compare-table th, .compare-table td { padding: 10px 16px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--border); white-space: nowrap; min-width: 140px; }
.compare-table th { position: sticky; left: 0; background: #f9fafb; font-weight: 700; color: var(--muted); z-index: 2; min-width: 100px; }
.compare-table td { font-weight: 500; }
.compare-table tr:first-child td { font-weight: 700; font-size: 14px; }

/* Map */
.map-container { display: none; margin-bottom: 14px; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); position: relative; z-index: 1; }
.map-container.visible { display: block; }
#map { height: 500px; width: 100%; }
.leaflet-pane { z-index: 1 !important; }
.leaflet-top, .leaflet-bottom { z-index: 2 !important; }

/* Rent Market Chart */
.market-chart { display: none; margin-bottom: 14px; background: white; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
.market-chart.visible { display: block; }
.market-chart h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.chart-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.chart-bar-label { width: 100px; font-size: 13px; font-weight: 600; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chart-bar-track { flex: 1; height: 28px; background: #f0f0f2; border-radius: 6px; overflow: hidden; position: relative; }
.chart-bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding: 0 10px; font-size: 12px; font-weight: 700; color: white; transition: width .3s ease; }
.chart-bar-count { font-size: 12px; color: var(--muted); width: 40px; flex-shrink: 0; }

/* Responsive */
@media (max-width: 640px) {
  .card-top { flex-direction: column; }
  .card-img, .card-img-placeholder { width: 100%; height: 160px; }
  .detail-pros-cons { grid-template-columns: 1fr; }
  .card-pros-cons { flex-direction: column; gap: 4px; }
  #map { height: 350px; }
  .compare-table th, .compare-table td { min-width: 120px; padding: 8px 12px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>物件ダッシュボード</h1>
  <div class="header-actions">
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">

<script>
let allData = [];
let filtered = [];
let sortKey = 'score', sortDir = 'desc';
let currentPage = 1;
let compareSet = new Set(); // URLs of properties selected for comparison
let mapInstance = null;
let mapVisible = false;
let chartVisible = false;

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Station coordinates for map
const STATION_COORDS = {
  '北参道': [35.6783, 139.7072], '明治神宮前': [35.6702, 139.7024],
  '渋谷': [35.6580, 139.7016], '南新宿': [35.6863, 139.6973],
  '代々木': [35.6835, 139.7021], '表参道': [35.6654, 139.7122],
  '国立競技場': [35.6796, 139.7148], '原宿': [35.6702, 139.7027],
  '代々木公園': [35.6680, 139.6886], '参宮橋': [35.6774, 139.6943],
  '初台': [35.6782, 139.6870], '千駄ヶ谷': [35.6811, 139.7112],
  '信濃町': [35.6801, 139.7199], '六本木': [35.6626, 139.7312],
  '神泉': [35.6558, 139.6936], '代々木八幡': [35.6658, 139.6852],
  '恵比寿': [35.6468, 139.7100], '青山一丁目': [35.6725, 139.7243],
  '幡ヶ谷': [35.6744, 139.6781], '代官山': [35.6485, 139.7027],
  '代々木上原': [35.6680, 139.6790], '池尻大橋': [35.6504, 139.6843],
  '東北沢': [35.6666, 139.6725], '乃木坂': [35.6661, 139.7268],
  '駒場東大前': [35.6609, 139.6819], '中目黒': [35.6440, 139.6992],
  '池ノ上': [35.6601, 139.6721], '外苑前': [35.6705, 139.7179],
  '下北沢': [35.6615, 139.6680],
};

// Maybe Store (localStorage) - △ 微妙
const MaybeStore = {
  KEY: 'bukken-maybes',
  _load() { try { return new Set(JSON.parse(localStorage.getItem(this.KEY)) || []); } catch { return new Set(); } },
  _save(s) { localStorage.setItem(this.KEY, JSON.stringify([...s])); },
  isMaybe(url) { return this._load().has(url); },
  toggle(url) {
    const s = this._load(); const maybed = !s.has(url);
    maybed ? s.add(url) : s.delete(url); this._save(s);
    if (maybed) { const l = LikesStore._load(); l.delete(url); LikesStore._save(l); const d = DislikesStore._load(); d.delete(url); DislikesStore._save(d); }
    return maybed;
  },
  getAll() { return this._load(); },
  export() { return [...this._load()]; },
};

// Notes Store (localStorage)
const NotesStore = {
  KEY: 'bukken-notes',
  _load() { try { return JSON.parse(localStorage.getItem(this.KEY)) || {}; } catch { return {}; } },
  _save(d) { localStorage.setItem(this.KEY, JSON.stringify(d)); },
  get(url) { return this._load()[url] || null; },
  set(url, note) {
    const d = this._load();
    const updated = { ...d, [url]: note };
    this._save(updated);
  },
  delete(url) {
    const d = this._load();
    const { [url]: _, ...rest } = d;
    this._save(rest);
  },
  hasNote(url) {
    const note = this.get(url);
    if (!note) return false;
    return !!(note.text || note.status);
  },
  getAll() { return this._load(); },
};

// Station rank mapping
const STATION_RANKS = {
  S: ['北参道'],
  A: ['明治神宮前','渋谷','南新宿','代々木','表参道','国立競技場','原宿','代々木公園','参宮橋','初台','千駄ヶ谷','千駄ケ谷'],
  B: ['信濃町','六本木','神泉','代々木八幡','恵比寿','青山一丁目','幡ヶ谷','代官山','代々木上原'],
};
function getStationRank(stationStr) {
  if (!stationStr) return null;
  for (const [rank, stations] of Object.entries(STATION_RANKS)) {
    for (const st of stations) {
      if (stationStr.includes(st)) return rank;
    }
  }
  return 'C';
}
function rankBadge(rank) {
  if (!rank) return '';
  const labels = { S: 'S', A: 'A', B: 'B', C: 'C' };
  return `<span class="station-rank rank-${rank}">${labels[rank]}ランク</span>`;
}

// Colors
function scoreColor(s) {
  if (s >= 75) return '#34c759';
  if (s >= 55) return '#ff9500';
  if (s >= 35) return '#ff9500';
  return '#ff3b30';
}
function scoreBg(s) {
  if (s >= 75) return '#f0fdf4';
  if (s >= 55) return '#fffbeb';
  if (s >= 35) return '#fff7ed';
  return '#fef2f2';
}
function sourceColor(s) {
  const m = { suumo: '#22c55e', homes: '#3b82f6', athome: '#a855f7', chintai: '#f59e0b',
    door: '#06b6d4', yahoo: '#ef4444', smocca: '#ec4899', 'athome会員': '#8b5cf6' };
  return m[s] || '#6b7280';
}
function recBadge(r) {
  const m = {
    '強くおすすめ': ['#dcfce7','#166534'],
    'おすすめ': ['#dcfce7','#15803d'],
    '普通': ['#fef9c3','#854d0e'],
    '微妙': ['#fed7aa','#9a3412'],
    'おすすめしない': ['#fecaca','#991b1b'],
  };
  const [bg,c] = m[r] || ['#f3f4f6','#374151'];
  return `<span class="badge" style="background:${bg};color:${c}">${esc(r)}</span>`;
}
function rentText(yen) {
  const man = yen / 10000;
  return man % 1 === 0 ? man + '万円' : man.toFixed(1) + '万円';
}

// Extract station name from station_access string
function extractStations(stationStr) {
  if (!stationStr) return [];
  const stations = [];
  // Match patterns like "初台駅", "京王新線/初台駅 歩5分", "三軒茶屋/東急田園都市線"
  const parts = stationStr.split(/[/／]/);
  for (const part of parts) {
    const m = part.match(/「?([^\s「」]+?)」?駅/);
    if (m) {
      stations.push(m[1].replace(/^.*線\s*/, '').trim());
    }
  }
  // Also try simpler pattern for "○○駅 歩Xm" format
  if (stations.length === 0) {
    const m2 = stationStr.match(/([^\s/／]+?)駅/g);
    if (m2) {
      for (const s of m2) {
        const name = s.replace('駅', '').replace(/.*線\s*/, '').replace(/[「」]/g, '').trim();
        if (name && !stations.includes(name)) stations.push(name);
      }
    }
  }
  return stations;
}

let stationFilterOpen = false;
let selectedStations = new Set(); // empty = all

function buildStationFilter() {
  const container = $('#station-filter');
  const checks = $('#station-checks');
  if (!allData.length) { container.style.display = 'none'; return; }
  container.style.display = 'block';

  // Count stations
  const counts = {};
  for (const p of allData) {
    for (const st of extractStations(p.station_access)) {
      counts[st] = (counts[st] || 0) + 1;
    }
  }

  // Group by rank
  const rankGroups = { S: [], A: [], B: [], C: [] };
  const stationList = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  for (const [name, count] of stationList) {
    const rank = getStationRank(name + '駅') || getStationRank(name) || 'C';
    const actualRank = STATION_RANKS.S?.some(s => name.includes(s) || s.includes(name)) ? 'S'
      : STATION_RANKS.A?.some(s => name.includes(s) || s.includes(name)) ? 'A'
      : STATION_RANKS.B?.some(s => name.includes(s) || s.includes(name)) ? 'B' : 'C';
    rankGroups[actualRank].push([name, count]);
  }

  let html = '<div class="st-actions"><button onclick="selectAllStations()">すべて選択</button><button onclick="clearAllStations()">すべて解除</button><button onclick="selectRankStations(\'S\')">Sのみ</button><button onclick="selectRankStations(\'SA\')">S+A</button></div>';
  const rankLabels = { S: 'Sランク', A: 'Aランク', B: 'Bランク', C: 'その他' };
  const rankColors = { S: '#92400e', A: '#1e40af', B: '#374151', C: '#9ca3af' };
  for (const rank of ['S', 'A', 'B', 'C']) {
    if (rankGroups[rank].length === 0) continue;
    html += `<div class="st-section">${rankLabels[rank]}</div>`;
    for (const [name, count] of rankGroups[rank]) {
      const checked = selectedStations.size === 0 || selectedStations.has(name) ? 'checked' : '';
      html += `<label class="st-check"><input type="checkbox" value="${esc(name)}" ${checked} onchange="onStationChange()"><span>${esc(name)}</span><span class="st-rank" style="color:${rankColors[rank]}">${rank}</span><span class="st-count">(${count})</span></label>`;
    }
  }
  checks.innerHTML = html;
  updateStationCount();
}

// Store all station names for rank selection
function getAllStationNames() {
  return [...$('#station-checks').querySelectorAll('input[type=checkbox]')].map(cb => cb.value);
}
function selectAllStations() {
  selectedStations.clear();
  $('#station-checks').querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true);
  onStationChange();
}
function clearAllStations() {
  selectedStations.clear();
  $('#station-checks').querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
  // When all unchecked, treat as "select specific ones"
  onStationChange();
}
function selectRankStations(ranks) {
  const wantedRanks = ranks.split('');
  $('#station-checks').querySelectorAll('input[type=checkbox]').forEach(cb => {
    const rankEl = cb.parentElement.querySelector('.st-rank');
    const rank = rankEl ? rankEl.textContent.trim() : 'C';
    cb.checked = wantedRanks.includes(rank);
  });
  onStationChange();
}
function onStationChange() {
  const all = $('#station-checks').querySelectorAll('input[type=checkbox]');
  const checked = [...all].filter(cb => cb.checked);
  if (checked.length === all.length || checked.length === 0) {
    selectedStations.clear(); // all or none = no filter
  } else {
    selectedStations = new Set(checked.map(cb => cb.value));
  }
  updateStationCount();
  applyFilters();
}
function updateStationCount() {
  const el = $('#station-selected-count');
  if (selectedStations.size > 0) {
    el.textContent = `(${selectedStations.size}駅選択中)`;
  } else {
    el.textContent = '';
  }
}

// Toggle station filter panel
$('#station-toggle').addEventListener('click', () => {
  stationFilterOpen = !stationFilterOpen;
  $('#station-checks').style.display = stationFilterOpen ? 'flex' : 'none';
  $('#station-arrow').textContent = stationFilterOpen ? '\u25B2' : '\u25BC';
});

// Likes Store (localStorage)
const LikesStore = {
  KEY: 'bukken-likes',
  _load() { try { return new Set(JSON.parse(localStorage.getItem(this.KEY)) || []); } catch { return new Set(); } },
  _save(s) { localStorage.setItem(this.KEY, JSON.stringify([...s])); },
  isLiked(url) { return this._load().has(url); },
  toggle(url) {
    const s = this._load(); const liked = !s.has(url);
    liked ? s.add(url) : s.delete(url); this._save(s);
    if (liked) { const d = DislikesStore._load(); d.delete(url); DislikesStore._save(d); const m = MaybeStore._load(); m.delete(url); MaybeStore._save(m); }
    return liked;
  },
  getAll() { return this._load(); },
  export() { return [...this._load()]; },
  import(urls) { const s = this._load(); urls.forEach(u => s.add(u)); this._save(s); },
};

// Dislikes Store (localStorage)
const DislikesStore = {
  KEY: 'bukken-dislikes',
  _load() { try { return new Set(JSON.parse(localStorage.getItem(this.KEY)) || []); } catch { return new Set(); } },
  _save(s) { localStorage.setItem(this.KEY, JSON.stringify([...s])); },
  isDisliked(url) { return this._load().has(url); },
  toggle(url) {
    const s = this._load(); const disliked = !s.has(url);
    disliked ? s.add(url) : s.delete(url); this._save(s);
    if (disliked) { const l = LikesStore._load(); l.delete(url); LikesStore._save(l); const m = MaybeStore._load(); m.delete(url); MaybeStore._save(m); }
    return disliked;
  },
  getAll() { return this._load(); },
  export() { return [...this._load()]; },
};

// Fetch
async function loadData() {
  const res = await fetch('data.json');
  allData = await res.json();
  // Merge localStorage likes, maybes & dislikes
  const likes = LikesStore.getAll();
  const dislikes = DislikesStore.getAll();
  const maybes = MaybeStore.getAll();
  allData.forEach(p => { p.liked = likes.has(p.url); p.disliked = dislikes.has(p.url); p.maybe = maybes.has(p.url); });
  buildStationFilter();
  applyFilters();
  updatePrefsBar();
}

// Stats
function renderStats() {
  const d = filtered;
  if (!d.length) { $('#stats').innerHTML = ''; return; }
  const best = Math.max(...d.map(p => p.score));
  const avg = Math.round(d.reduce((a, p) => a + p.score, 0) / d.length);
  const cheapest = Math.min(...d.map(p => p.total_rent));
  const liked = d.filter(p => p.liked).length;
  $('#stats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${d.length}</div><div class="stat-lbl">物件数</div></div>
    <div class="stat-card"><div class="stat-val" style="color:${scoreColor(best)}">${best}</div><div class="stat-lbl">最高スコア</div></div>
    <div class="stat-card"><div class="stat-val">${rentText(cheapest)}</div><div class="stat-lbl">最安家賃</div></div>
    <div class="stat-card"><div class="stat-val">${avg}</div><div class="stat-lbl">平均スコア</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--red)">${liked}</div><div class="stat-lbl">いいね</div></div>
  `;
}

// Filters
function applyFilters() {
  const rentMin = parseFloat($('#f-rent-min').value) * 10000 || 0;
  const rentMax = parseFloat($('#f-rent-max').value) * 10000 || Infinity;
  const layout = $('#f-layout').value;
  const scoreMin = parseInt($('#f-score').value) || 0;
  const source = $('#f-source').value;
  const areaMin = parseFloat($('#f-area-min').value) || 0;
  const areaMax = parseFloat($('#f-area-max').value) || Infinity;
  const maxAge = parseInt($('#f-age').value) || 0;
  const roomPos = $('#f-room-pos').value;
  const currentYear = new Date().getFullYear();
  filtered = allData.filter(p => {
    if (p.total_rent < rentMin || p.total_rent > rentMax) return false;
    if (layout && !p.layout.includes(layout)) return false;
    if (p.score < scoreMin) return false;
    if (source && p.source !== source) return false;
    if (p.area_sqm < areaMin || p.area_sqm > areaMax) return false;
    if (maxAge > 0) {
      const yb = p.year_built || '';
      if (yb.includes('新築')) { /* pass */ }
      else {
        const m = yb.match(/(\d{4})/);
        if (!m || currentYear - parseInt(m[1]) > maxAge) return false;
      }
    }
    // Room position filter
    if (roomPos) {
      const text = [p.direction, p.name, ...(p.features || [])].join(' ');
      if (!text.includes(roomPos)) return false;
    }
    // Station filter
    if (selectedStations.size > 0) {
      const propStations = extractStations(p.station_access);
      if (!propStations.some(s => selectedStations.has(s))) return false;
    }
    return true;
  });
  currentPage = 1;
  applySort();
}

function getSortVal(p, key) {
  if (key === 'year_built_num') {
    // "2024年3月" -> 202403, "新築" -> 999999
    const yb = p.year_built || '';
    if (yb.includes('新築')) return 999999;
    const m = yb.match(/(\d{4})\D*(\d{1,2})?/);
    return m ? parseInt(m[1]) * 100 + parseInt(m[2] || '1') : 0;
  }
  if (key === 'walk_min') {
    // "初台駅 歩5分" -> 5
    const m = (p.station_access || '').match(/(\d+)\s*分/);
    return m ? parseInt(m[1]) : 99;
  }
  if (key === 'scraped_at') {
    return p.scraped_at || '0';
  }
  return p[key] || 0;
}

function applySort() {
  filtered.sort((a, b) => {
    const va = getSortVal(a, sortKey);
    const vb = getSortVal(b, sortKey);
    if (typeof va === 'string') {
      return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    return sortDir === 'asc' ? va - vb : vb - va;
  });
  renderStats();
  renderCards();
  if (mapVisible) updateMapMarkers();
  if (chartVisible) renderChart();
}

// Saved filter presets
const PRESETS_KEY = 'bukken-filter-presets';
let activePreset = null;

function getPresets() {
  try { return JSON.parse(localStorage.getItem(PRESETS_KEY)) || []; }
  catch { return []; }
}

function savePresets(presets) {
  localStorage.setItem(PRESETS_KEY, JSON.stringify(presets));
}

function getCurrentFilters() {
  return {
    rentMin: $('#f-rent-min').value,
    rentMax: $('#f-rent-max').value,
    layout: $('#f-layout').value,
    score: $('#f-score').value,
    source: $('#f-source').value,
    areaMin: $('#f-area-min').value,
    areaMax: $('#f-area-max').value,
    age: $('#f-age').value,
    roomPos: $('#f-room-pos').value,
    stations: [...selectedStations],
  };
}

function applyPreset(preset) {
  $('#f-rent-min').value = preset.filters.rentMin || '';
  $('#f-rent-max').value = preset.filters.rentMax || '';
  $('#f-layout').value = preset.filters.layout || '';
  $('#f-score').value = preset.filters.score || '';
  $('#f-source').value = preset.filters.source || '';
  $('#f-area-min').value = preset.filters.areaMin || '';
  $('#f-area-max').value = preset.filters.areaMax || '';
  $('#f-age').value = preset.filters.age || '';
  $('#f-room-pos').value = preset.filters.roomPos || '';
  const st = new Set(preset.filters.stations || []);
  if (st.size > 0) {
    selectedStations = st;
    $('#station-checks').querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.checked = selectedStations.has(cb.value);
    });
  } else {
    selectedStations.clear();
    $('#station-checks').querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true);
  }
  updateStationCount();
  activePreset = preset.name;
  renderPresets();
  applyFilters();
}

function deletePreset(name) {
  const presets = getPresets().filter(p => p.name !== name);
  savePresets(presets);
  if (activePreset === name) activePreset = null;
  renderPresets();
}

function saveNewPreset() {
  const name = prompt('条件名を入力してください:');
  if (!name || !name.trim()) return;
  const presets = getPresets().filter(p => p.name !== name.trim());
  presets.push({ name: name.trim(), filters: getCurrentFilters() });
  savePresets(presets);
  activePreset = name.trim();
  renderPresets();
}

function renderPresets() {
  const presets = getPresets();
  const container = $('#saved-filters');
  if (!presets.length) {
    container.innerHTML = '<button class="preset-save" onclick="saveNewPreset()">+ 条件を保存</button>';
    return;
  }
  let html = '';
  for (const p of presets) {
    const cls = activePreset === p.name ? 'preset-btn active' : 'preset-btn';
    html += `<button class="${cls}" onclick="applyPreset(${esc(JSON.stringify(JSON.stringify(p)))})">
      ${esc(p.name)}<span class="preset-del" onclick="event.stopPropagation();deletePreset(${esc(JSON.stringify(JSON.stringify(p.name)))})">&#10005;</span>
    </button>`;
  }
  html += '<button class="preset-save" onclick="saveNewPreset()">+ 保存</button>';
  container.innerHTML = html;
}

// Fix: applyPreset from inline onclick needs to parse JSON string
const _origApplyPreset = applyPreset;
applyPreset = function(arg) {
  if (typeof arg === 'string') arg = JSON.parse(arg);
  _origApplyPreset(arg);
};
const _origDeletePreset = deletePreset;
deletePreset = function(arg) {
  if (typeof arg === 'string') {
    try { arg = JSON.parse(arg); } catch {}
  }
  _origDeletePreset(arg);
};

// Like (localStorage)
function toggleLike(idx) {
  const p = filtered[idx]; if (!p) return;
  const liked = LikesStore.toggle(p.url);

// Maybe (localStorage)
function toggleMaybe(idx) {
  const p = filtered[idx]; if (!p) return;
  const maybed = MaybeStore.toggle(p.url);
  p.maybe = maybed;
  if (maybed) { p.liked = false; p.disliked = false; }
  const orig = allData.find(d => d.url === p.url);
  if (orig) { orig.maybe = maybed; if (maybed) { orig.liked = false; orig.disliked = false; } }
  renderCards(); renderStats(); updatePrefsBar();
}

// Dislike (localStorage)
function toggleDislike(idx) {
  const p = filtered[idx]; if (!p) return;
  const disliked = DislikesStore.toggle(p.url);
  p.disliked = disliked;
  if (disliked) { p.liked = false; p.maybe = false; }
  const orig = allData.find(d => d.url === p.url);
  if (orig) { orig.disliked = disliked; if (disliked) { orig.liked = false; orig.maybe = false; } }
  renderCards(); renderStats(); updatePrefsBar();
}

// Preferences (client-side computation)
function updatePrefsBar() {
  const liked = allData.filter(p => p.liked);
  const bar = $('#prefs-bar');
  if (liked.length === 0) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');

  const rents = liked.map(p => p.total_rent).filter(Boolean);
  const areas = liked.map(p => p.area_sqm).filter(Boolean);
  const layoutMap = {};
  liked.forEach(p => { if (p.layout) layoutMap[p.layout] = (layoutMap[p.layout] || 0) + 1; });
  const stationMap = {};
  liked.forEach(p => {
    if (!p.station_access) return;
    const m = p.station_access.match(/([^\s/]+駅)/);
    if (m) stationMap[m[1]] = (stationMap[m[1]] || 0) + 1;
  });

  const parts = [];
  if (rents.length) parts.push(`家賃${Math.round(Math.min(...rents)/10000)}〜${Math.round(Math.max(...rents)/10000)}万円`);
  if (areas.length) parts.push(`面積${Math.min(...areas)}〜${Math.max(...areas)}m2`);
  const topLayout = Object.entries(layoutMap).sort((a,b) => b[1]-a[1])[0];
  if (topLayout) parts.push(`${topLayout[0]}が好み`);
  const topStation = Object.entries(stationMap).sort((a,b) => b[1]-a[1])[0];
  if (topStation) parts.push(`${topStation[0]}周辺`);

  const dislikeCount = allData.filter(p => p.disliked).length;
  const countText = dislikeCount > 0 ? `${liked.length}件いいね / ${dislikeCount}件興味なし` : `${liked.length}件いいね`;
  $('#prefs-text').innerHTML = `<span class="prefs-count">${countText}</span> &rarr; ${esc(parts.join('、') || '分析中...')}`;
}

const GH_API = 'https://api.github.com/repos/Jun-Jun1120/bukken-scraper';
let scrapePolling = null;

$('#btn-scrape').addEventListener('click', async () => {
  const token = getGhToken(); if (!token) return;
  try {
    $('#btn-scrape').disabled = true;
    $('#status').textContent = 'スクレイピング開始中...';
    const res = await fetch(`${GH_API}/actions/workflows/253880933/dispatches`, {
      method: 'POST',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref: 'main' }),

      $('#progress-fill').style.width = '0%';
      setTimeout(() => pollScrapeProgress(token), 10000);
    } else if (res.status === 401 || res.status === 403) {
      localStorage.removeItem(GH_TOKEN_KEY);
      $('#status').textContent = 'トークンが無効です。再試行してください';
      $('#btn-scrape').disabled = false;
    } else {
      $('#status').textContent = `開始失敗 (${res.status})`;
      $('#btn-scrape').disabled = false;
    }
  } catch {
    $('#status').textContent = 'エラーが発生しました';
    $('#btn-scrape').disabled = false;
  }
});

async function pollScrapeProgress(token) {
  const headers = { 'Authorization': `token ${token}` };
  try {
    const res = await fetch(`${GH_API}/actions/workflows/253880933/runs?per_page=1&status=in_progress`, { headers });
    const data = await res.json();
    let run = data.workflow_runs?.[0];

    if (!run) {
      // Check queued
      const res2 = await fetch(`${GH_API}/actions/workflows/253880933/runs?per_page=1&status=queued`, { headers });
      const data2 = await res2.json();
      run = data2.workflow_runs?.[0];
    }

    if (!run) {
      // Check latest completed
      const res3 = await fetch(`${GH_API}/actions/workflows/253880933/runs?per_page=1`, { headers });
      const data3 = await res3.json();
      const latest = data3.workflow_runs?.[0];
      if (latest && latest.conclusion) {
        const icon = latest.conclusion === 'success' ? '✅' : '❌';
        $('#progress-fill').style.width = '100%';
        $('#status').textContent = `${icon} 完了: ${latest.conclusion}`;
        $('#btn-scrape').disabled = false;
        setTimeout(() => { loadData(); }, 3000);
        setTimeout(() => { $('#status').textContent = '毎朝7時に自動更新'; $('#progress-bar').classList.remove('active'); }, 10000);
        return;
      }
    }

    if (run) {
      // Get job details for step-level progress
      const jobRes = await fetch(run.jobs_url, { headers });
      const jobData = await jobRes.json();
      const job = jobData.jobs?.[0];

      if (job) {
        const steps = job.steps || [];
        const completed = steps.filter(s => s.conclusion === 'success').length;
        const total = steps.length || 1;
        const current = steps.find(s => s.status === 'in_progress');
        const elapsed = Math.round((Date.now() - new Date(run.created_at)) / 60000);

        const stepNames = {
          'Set up job': '準備中',
          'Run actions/checkout@v4': 'チェックアウト',
          'Set up Python': 'Python準備',
          'Install dependencies': '依存関係インストール',
          'Run scraper': 'スクレイピング実行中',
          'Upload results': '結果アップロード',
          'Notify new properties and delisted alerts': '通知送信',
          'Merge likes into data and update dashboard': 'データ更新',
          'Deploy to Cloudflare Pages': 'デプロイ中',
        };

        const stepLabel = current ? (stepNames[current.name] || current.name) : '待機中';
        const pct = Math.round(completed / total * 100);
        $('#status').textContent = `⏳ ${stepLabel} (${pct}% / ${elapsed}分経過)`;
        $('#progress-fill').style.width = `${pct}%`;
      } else {
        const elapsed = Math.round((Date.now() - new Date(run.created_at)) / 60000);
        $('#status').textContent = `⏳ 実行中... (${elapsed}分経過)`;
      }

      setTimeout(() => pollScrapeProgress(token), 15000);
    } else {
      $('#status').textContent = '⏳ キュー待ち...';
      setTimeout(() => pollScrapeProgress(token), 10000);
    }
  } catch {
    $('#status').textContent = '進捗取得エラー';
    setTimeout(() => pollScrapeProgress(token), 30000);
  }
}

// GitHub Sync
$('#btn-sync').addEventListener('click', async () => {
  const token = getGhToken(); if (!token) return;
  const likes = LikesStore.export();
  const dislikes = DislikesStore.export();
  const maybes = MaybeStore.export();
  const notes = NotesStore.getAll();
  try {
    $('#status').textContent = '同期中...';
    const res = await fetch('https://api.github.com/repos/Jun-Jun1120/bukken-scraper/dispatches', {
      method: 'POST',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ event_type: 'sync-likes', client_payload: { likes, dislikes, maybes, notes } }),
    });
    if (res.status === 204) {
      $('#status').textContent = `同期完了 (いいね${likes.length}件, 興味なし${dislikes.length}件)`;
    } else if (res.status === 401 || res.status === 403) {
      localStorage.removeItem(GH_TOKEN_KEY);
      $('#status').textContent = 'トークンが無効です。再試行してください';
    } else {
      $('#status').textContent = `同期失敗 (${res.status})`;
    }
  } catch (e) {
    $('#status').textContent = '同期エラー';
  }
  setTimeout(() => { $('#status').textContent = '毎朝7時に自動更新'; }, 5000);
});

// Export/Import Likes (includes notes)
$('#btn-export-likes').addEventListener('click', () => {
  const exportData = {
    likes: LikesStore.export(),
    dislikes: DislikesStore.export(),
    maybes: MaybeStore.export(),
    notes: NotesStore.getAll(),
  };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'bukken-likes.json'; a.click();
});
$('#btn-import-likes').addEventListener('change', async (e) => {
  const file = e.target.files[0]; if (!file) return;
  const text = await file.text();
  try {
    const data = JSON.parse(text);
    if (Array.isArray(data)) {
      // Backward compatible: plain array of URLs
      LikesStore.import(data);
      allData.forEach(p => { p.liked = LikesStore.isLiked(p.url); });
      renderCards(); renderStats(); updatePrefsBar();
      $('#status').textContent = `${data.length}件インポート完了`;
    } else if (data && data.likes) {
      // New format with likes, dislikes, notes
      LikesStore.import(data.likes || []);
      if (data.notes) {
        const existing = NotesStore.getAll();
        const merged = { ...existing, ...data.notes };
        localStorage.setItem(NotesStore.KEY, JSON.stringify(merged));
      }
      allData.forEach(p => { p.liked = LikesStore.isLiked(p.url); });
      renderCards(); renderStats(); updatePrefsBar();
      $('#status').textContent = `${(data.likes||[]).length}件インポート完了`;
    }
    setTimeout(() => { $('#status').textContent = '毎朝7時に自動更新'; }, 3000);
  } catch { alert('JSONファイルが不正です'); }
  e.target.value = '';
});

// === Comparison Feature ===
function toggleCompare(url, checked) {
  if (checked) {
    compareSet.add(url);
  } else {
    compareSet.delete(url);
  }
  updateCompareFab();
}

function updateCompareFab() {
  const fab = $('#compare-fab');
  if (compareSet.size >= 2) {
    fab.style.display = 'block';
    fab.textContent = `比較する (${compareSet.size}件)`;
  } else {
    fab.style.display = 'none';
  }
}

function openComparison() {
  const props = allData.filter(p => compareSet.has(p.url));
  if (props.length < 2) return;

  const rows = [
    { label: '物件名', fn: p => esc(p.name) },
    { label: '家賃', fn: p => rentText(p.rent) },
    { label: '総額/月', fn: p => rentText(p.total_rent) },
    { label: '間取り', fn: p => esc(p.layout || '-') },
    { label: '面積', fn: p => p.area_sqm + 'm\u00B2' },
    { label: '築年', fn: p => esc(p.year_built || '-') },
    { label: '最寄り駅', fn: p => esc((p.station_access || '').split('/')[0] || '-') },
    { label: 'スコア', fn: p => `<span style="color:${scoreColor(p.score)};font-weight:800">${p.score}</span>` },
    { label: '向き', fn: p => esc(p.direction || '-') },
    { label: '構造', fn: p => esc(p.building_type || '-') },
    { label: '敷金', fn: p => p.deposit ? p.deposit.toLocaleString() + '円' : 'なし' },
    { label: '礼金', fn: p => p.key_money ? p.key_money.toLocaleString() + '円' : 'なし' },
    { label: '設備', fn: p => (p.features || []).slice(0, 5).map(f => esc(f)).join(', ') || '-' },
  ];

  let html = '<table class="compare-table">';
  for (const row of rows) {
    html += '<tr>';
    html += `<th>${row.label}</th>`;
    for (const p of props) {
      html += `<td>${row.fn(p)}</td>`;
    }
    html += '</tr>';
  }
  html += '</table>';

  $('#compare-body').innerHTML = html;
  $('#compare-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeComparison() {
  $('#compare-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// === Map Feature ===
function toggleMap() {
  mapVisible = !mapVisible;
  const container = $('#map-container');
  const btn = $('#btn-map');
  // Close chart if opening map
  if (mapVisible && chartVisible) { chartVisible = false; $('#market-chart').classList.remove('visible'); $('#btn-chart').classList.remove('active'); }
  if (mapVisible) {
    container.classList.add('visible');
    btn.classList.add('active');
    initMap();
    updateMapMarkers();
  } else {
    container.classList.remove('visible');
    btn.classList.remove('active');
  }
}

function initMap() {
  if (mapInstance) return;
  const dtLat = 35.656619, dtLng = 139.697314;
  mapInstance = L.map('map').setView([dtLat, dtLng], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(mapInstance);

  // DT Building pin (blue)
  L.marker([dtLat, dtLng], {
    icon: L.divIcon({
      className: '',
      html: '<div style="background:#0071e3;width:14px;height:14px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>',
      iconSize: [20, 20],
      iconAnchor: [10, 10],
    }),
  }).addTo(mapInstance).bindPopup('<strong>渋谷DTビル</strong><br>道玄坂1-16-10<br>6F〜9F');

  // 3km radius circle
  L.circle([dtLat, dtLng], {
    radius: 3000,
    color: '#0071e3',
    fillColor: '#0071e380',
    fillOpacity: 0.06,
    weight: 2,
    dashArray: '6 4',
  }).addTo(mapInstance);
}

let mapMarkers = [];
function updateMapMarkers() {
  if (!mapInstance) return;
  // Remove old markers
  mapMarkers.forEach(m => mapInstance.removeLayer(m));
  mapMarkers = [];

  // Group properties by station
  const stationProps = {};
  for (const p of filtered) {
    const stations = extractStations(p.station_access);
    for (const st of stations) {
      if (STATION_COORDS[st]) {
        if (!stationProps[st]) stationProps[st] = [];
        stationProps[st].push(p);
        break; // use first matched station
      }
    }
  }

  for (const [station, props] of Object.entries(stationProps)) {
    const coords = STATION_COORDS[station];
    if (!coords) continue;
    for (let i = 0; i < props.length; i++) {
      const p = props[i];
      // Offset slightly so markers don't overlap
      const offset = i * 0.0002;
      const lat = coords[0] + offset;
      const lng = coords[1] + (i % 2 === 0 ? offset : -offset);
      const color = p.score >= 70 ? '#34c759' : p.score >= 50 ? '#ffcc00' : '#ff3b30';
      const marker = L.circleMarker([lat, lng], {
        radius: 7,
        fillColor: color,
        color: '#fff',
        weight: 2,
        fillOpacity: 0.9,
      }).addTo(mapInstance);
      marker.bindPopup(`<strong>${esc(p.name)}</strong><br>${rentText(p.total_rent)}/月 | ${p.score}点<br>${esc(p.layout || '')} ${p.area_sqm}m² ${esc(p.year_built || '')}<br><a href="${esc(p.url)}" target="_blank" rel="noopener" style="color:#0071e3;font-weight:600">物件サイトへ &rarr;</a>`);
      mapMarkers.push(marker);
    }
  }
}

// === Rent Market Chart ===
function toggleChart() {
  chartVisible = !chartVisible;
  const container = $('#market-chart');
  const btn = $('#btn-chart');
  // Close map if opening chart
  if (chartVisible && mapVisible) { mapVisible = false; $('#map-container').classList.remove('visible'); $('#btn-map').classList.remove('active'); }
  if (chartVisible) {
    container.classList.add('visible');
    btn.classList.add('active');
    renderChart();
  } else {
    container.classList.remove('visible');
    btn.classList.remove('active');
  }
}

function renderChart() {
  const container = $('#market-chart');
  // Group by nearest station
  const stationData = {};
  for (const p of filtered) {
    const stations = extractStations(p.station_access);
    const station = stations[0] || '不明';
    if (!stationData[station]) stationData[station] = { total: 0, count: 0 };
    stationData[station] = {
      total: stationData[station].total + p.total_rent,
      count: stationData[station].count + 1,
    };
  }

  const entries = Object.entries(stationData)
    .map(([name, d]) => ({ name, avg: Math.round(d.total / d.count), count: d.count }))
    .sort((a, b) => a.avg - b.avg);

  if (!entries.length) {
    container.innerHTML = '<h3>家賃相場グラフ</h3><p style="color:var(--muted);font-size:14px">データがありません</p>';
    return;
  }

  const maxRent = Math.max(...entries.map(e => e.avg));

  let html = '<h3>家賃相場グラフ（駅別平均総額）</h3>';
  for (const e of entries) {
    const pct = Math.max((e.avg / maxRent) * 100, 8);
    const color = e.avg / 10000 <= 10 ? 'var(--green)' : e.avg / 10000 <= 15 ? 'var(--orange)' : 'var(--red)';
    html += `
      <div class="chart-bar-row">
        <div class="chart-bar-label">${esc(e.name)}</div>
        <div class="chart-bar-track">
          <div class="chart-bar-fill" style="width:${pct}%;background:${color}">${rentText(e.avg)}</div>
        </div>
        <div class="chart-bar-count">${e.count}件</div>
      </div>`;
  }
  container.innerHTML = html;
}

// Init
loadData();
</script>
