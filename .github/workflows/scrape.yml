  name: Daily Property Scrape

  on:
    schedule:
      # 毎日 AM 7:00 JST (UTC 22:00 前日)
      - cron: '0 22 * * *'
    workflow_dispatch: # 手動実行も可能

  jobs:
    scrape:
      runs-on: ubuntu-latest
      timeout-minutes: 90

      steps:
        - uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.12'
            cache: 'pip'

        - name: Install dependencies
          run: |
            pip install -r requirements.txt
            playwright install chromium
            playwright install-deps

        - name: Run scraper
          env:
            GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            ATHOME_USER: ${{ secrets.ATHOME_USER }}
            ATHOME_PASS: ${{ secrets.ATHOME_PASS }}
          run: |
            python main.py --max-pages 3 --sheets

        - name: Upload results
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: scrape-results-${{ github.run_number }}
            path: |
              output/data.json
              output/*.csv
              output/report.html
            retention-days: 30

        - name: Update dashboard data and commit
          run: |
            cp output/data.json docs/data.json || true
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add output/data.json docs/data.json || true
            git diff --cached --quiet || git commit -m "chore: update property data $(date +%Y-%m-%d)"
            git push || true
