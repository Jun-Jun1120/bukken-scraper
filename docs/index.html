<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>物件ダッシュボード</title>
<style>
:root {
  --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --muted: #6e6e73;
  --border: #e5e5ea; --accent: #0071e3; --green: #34c759; --red: #ff3b30;
  --orange: #ff9500; --yellow: #ffcc00; --purple: #af52de;
  --radius: 14px; --shadow: 0 2px 8px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  background: rgba(255,255,255,.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px; position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn {
  padding: 9px 20px; border-radius: 20px; border: none; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all .2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #0077ed; transform: scale(1.02); }
.btn-primary:disabled { background: #99caff; cursor: not-allowed; transform: none; }
.btn-outline { background: rgba(0,0,0,.04); color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { background: rgba(0,0,0,.08); }
.status-text { font-size: 13px; color: var(--muted); max-width: 260px; text-align: right; }

/* Layout */
.main { max-width: 1100px; margin: 0 auto; padding: 20px; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 18px; }
.stat-card {
  background: white; padding: 14px 12px; border-radius: var(--radius);
  box-shadow: var(--shadow); text-align: center;
}
.stat-val { font-size: 24px; font-weight: 800; letter-spacing: -.5px; }
.stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* Filters */
.filters {
  background: white; border-radius: var(--radius); padding: 16px 20px;
  box-shadow: var(--shadow); margin-bottom: 14px;
}
.filters-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 12px; font-weight: 600; color: var(--muted); }
.filter-group select, .filter-group input {
  padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; background: white; color: var(--text); min-width: 100px; transition: border-color .2s;
}
.filter-group select:focus, .filter-group input:focus { outline: none; border-color: var(--accent); }
.filter-group input[type="number"] { width: 80px; }

/* Saved filters */
.saved-filters { display: flex; gap: 6px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
.saved-filters .preset-btn {
  padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border);
  background: white; font-size: 12px; cursor: pointer; transition: all .2s;
  display: inline-flex; align-items: center; gap: 4px;
}
.saved-filters .preset-btn:hover { border-color: var(--accent); background: #f0f4ff; }
.saved-filters .preset-btn.active { border-color: var(--accent); background: var(--accent); color: white; }
.saved-filters .preset-del { font-size: 10px; opacity: .5; cursor: pointer; margin-left: 2px; }
.saved-filters .preset-del:hover { opacity: 1; color: var(--red); }
.saved-filters .preset-save {
  padding: 5px 12px; border-radius: 20px; border: 1.5px dashed var(--border);
  background: transparent; font-size: 12px; cursor: pointer; color: var(--muted); transition: all .2s;
}
.saved-filters .preset-save:hover { border-color: var(--accent); color: var(--accent); }

/* Prefs bar */
.prefs-bar {
  background: linear-gradient(135deg, #f0f7ff, #fef1f7); border-radius: var(--radius);
  padding: 12px 18px; margin-bottom: 14px; display: none; align-items: center; gap: 10px;
  box-shadow: var(--shadow);
}
.prefs-bar.visible { display: flex; }
.prefs-bar .prefs-icon { font-size: 18px; }
.prefs-bar .prefs-text { font-size: 13px; color: #4b5563; }
.prefs-bar .prefs-count { font-weight: 700; color: var(--accent); }

/* Sort + count bar */
.toolbar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.result-count { font-size: 14px; color: var(--text); font-weight: 600; }
.sort-btns { display: flex; gap: 4px; flex-wrap: wrap; }
.sort-btn {
  padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
  background: white; font-size: 13px; cursor: pointer; color: var(--muted); font-weight: 600;
  transition: all .15s;
}
.sort-btn:hover { border-color: var(--accent); color: var(--accent); }
.sort-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.per-page select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }

/* Station filter checkboxes */
.st-check { display: inline-flex; align-items: center; gap: 3px; cursor: pointer; font-size: 13px; user-select: none; }
.st-check input { margin: 0; cursor: pointer; }
.st-check .st-rank { font-size: 10px; font-weight: 800; margin-left: 1px; }
.st-check .st-count { font-size: 11px; color: var(--muted); }
.st-section { width: 100%; font-size: 11px; font-weight: 700; color: var(--muted); margin-top: 6px; padding-bottom: 2px; border-bottom: 1px solid var(--border); }
.st-section:first-child { margin-top: 0; }
.st-actions { display: flex; gap: 8px; margin-bottom: 6px; }
.st-actions button { font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; font-weight: 600; padding: 0; }
.st-actions button:hover { text-decoration: underline; }

/* Cards list */
.cards { display: flex; flex-direction: column; gap: 12px; }

/* Card */
.card {
  background: white; border-radius: var(--radius); padding: 0;
  box-shadow: var(--shadow); cursor: pointer; transition: all .2s;
  overflow: hidden; border: 1px solid transparent;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.1); border-color: var(--border); }
.card-border { height: 4px; width: 100%; }
.card-body { padding: 18px 22px; }
.card-top { display: flex; gap: 14px; align-items: start; }
.card-info { flex: 1; min-width: 0; }
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.card-name { font-size: 16px; font-weight: 700; letter-spacing: -.2px; }
.card-address { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.meta-chip {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 600;
  background: #f0f0f2; color: var(--text);
}
.meta-chip.rent { background: #fff0f0; color: var(--red); font-weight: 700; font-size: 15px; }
.card-station { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 450px; }

/* Card comment preview */
.card-comment {
  margin-top: 12px; padding-top: 12px; border-top: 1px solid #ebebed;
}
.card-pros-cons { display: flex; gap: 16px; font-size: 13px; margin-bottom: 8px; flex-wrap: wrap; }
.card-pros-cons .pro { color: #059669; font-weight: 500; }
.card-pros-cons .con { color: #dc2626; font-weight: 500; }
.card-pros-cons .pro::before { content: "\\2713 "; font-weight: 700; }
.card-pros-cons .con::before { content: "\\2717 "; font-weight: 700; }
.card-comment-text {
  font-size: 13px; color: #4b5563; line-height: 1.7;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* Score area */
.card-score-area { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; gap: 4px; min-width: 70px; }
.like-btn {
  background: none; border: none; font-size: 22px; cursor: pointer;
  padding: 2px 6px; border-radius: 50%; transition: all .2s; line-height: 1;
}
.like-btn:hover { background: #fef2f2; transform: scale(1.3); }
.like-btn.liked { color: var(--red); }
.like-btn:not(.liked) { color: #d1d5db; }
.score-circle {
  width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  flex-direction: column; font-weight: 800; font-size: 22px; line-height: 1;
}
.score-circle small { font-size: 10px; font-weight: 600; opacity: .6; }
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 6px;
  font-size: 12px; font-weight: 700; white-space: nowrap;
}
.station-rank {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 800; letter-spacing: .3px;
}
.rank-S { background: #fef3c7; color: #92400e; }
.rank-A { background: #dbeafe; color: #1e40af; }
.rank-B { background: #e5e7eb; color: #374151; }
.rank-C { background: #f3f4f6; color: #9ca3af; }

/* Card image */
.card-img {
  width: 110px; height: 82px; object-fit: cover; border-radius: 10px;
  flex-shrink: 0; background: var(--bg);
}
.card-img-placeholder {
  width: 110px; height: 82px; border-radius: 10px; flex-shrink: 0;
  background: #f0f0f2; display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 24px;
}

/* Detail modal */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200;
  display: none; align-items: start; justify-content: center; padding: 40px 20px;
  overflow-y: auto; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.overlay.open { display: flex; }
.detail {
  background: white; border-radius: 20px; max-width: 760px; width: 100%;
  padding: 32px; position: relative; animation: slideUp .25s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.detail-close {
  position: absolute; top: 16px; right: 16px; background: var(--bg);
  border: none; width: 36px; height: 36px; border-radius: 50%;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.detail-close:hover { background: #e5e5ea; }
.detail h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; padding-right: 40px; letter-spacing: -.3px; }
.detail .address { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
.detail-img {
  width: 100%; max-height: 300px; object-fit: cover; border-radius: 14px;
  margin-bottom: 16px; background: var(--bg);
}
.detail-score-bar {
  display: flex; align-items: center; gap: 20px; padding: 20px;
  border-radius: 14px; margin-bottom: 20px;
}
.detail-score { font-size: 52px; font-weight: 800; line-height: 1; letter-spacing: -1px; }
.detail-score-max { font-size: 16px; color: var(--muted); }

.detail-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px; margin-bottom: 20px;
}
.detail-item {
  padding: 10px 12px; background: #fafafa; border-radius: 10px;
}
.detail-item .d-label { font-size: 12px; color: var(--muted); font-weight: 600; }
.detail-item .d-value { font-size: 16px; font-weight: 700; margin-top: 4px; }
.detail-item .d-value.total { color: var(--red); }
.detail-station { font-size: 14px; color: #374151; margin-bottom: 16px; padding: 12px 16px; background: #fafafa; border-radius: 10px; line-height: 1.6; }
.detail-features { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.detail-features .tag { background: #f0f0f2; padding: 5px 12px; border-radius: 8px; font-size: 13px; color: #374151; }

/* Pros / Cons - much better visibility */
.detail-eval { margin-bottom: 20px; }
.detail-eval h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; letter-spacing: -.2px; }
.detail-pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.pros-card, .cons-card {
  padding: 14px 16px; border-radius: 12px;
}
.pros-card { background: #f0fdf4; border: 1px solid #bbf7d0; }
.cons-card { background: #fef2f2; border: 1px solid #fecaca; }
.pros-card h4 { font-size: 14px; color: #166534; margin-bottom: 10px; font-weight: 700; }
.cons-card h4 { font-size: 14px; color: #991b1b; margin-bottom: 10px; font-weight: 700; }
.pros-card ul, .cons-card ul { list-style: none; }
.pros-card li { color: #15803d; font-size: 14px; padding: 4px 0; line-height: 1.6; }
.cons-card li { color: #b91c1c; font-size: 14px; padding: 4px 0; line-height: 1.6; }
.pros-card li::before { content: "\2713\00a0"; font-weight: 700; }
.cons-card li::before { content: "\2717\00a0"; font-weight: 700; }

/* AI Comment - prominent */
.detail-comment {
  padding: 20px 22px; border-radius: 14px; font-size: 15px;
  line-height: 1.8; color: #1f2937; margin-bottom: 24px;
  border-left: 4px solid var(--accent); background: #f8fafc;
}
.detail-comment-label {
  font-size: 12px; font-weight: 700; color: var(--accent);
  margin-bottom: 8px;
}
.detail-link { text-align: right; }
.detail-link a {
  display: inline-block; padding: 10px 20px; border-radius: 10px;
  background: var(--accent); color: white; text-decoration: none; font-weight: 600; font-size: 14px;
  transition: background .2s;
}
.detail-link a:hover { background: #0077ed; }
.source-badge {
  display: inline-block; padding: 3px 10px; border-radius: 6px;
  font-size: 12px; font-weight: 700; letter-spacing: .3px;
}

/* Pagination */
.pagination { display: flex; justify-content: center; gap: 4px; margin-top: 20px; }
.page-btn {
  padding: 6px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  background: white; cursor: pointer; font-size: 13px; transition: all .15s;
}
.page-btn:hover { border-color: var(--accent); }
.page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.page-btn:disabled { opacity: .3; cursor: not-allowed; }

/* Empty state */
.empty { text-align: center; padding: 80px 20px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty p { font-size: 14px; }

/* Responsive */
@media (max-width: 640px) {
  .card-top { flex-direction: column; }
  .card-img, .card-img-placeholder { width: 100%; height: 160px; }
  .detail-pros-cons { grid-template-columns: 1fr; }
  .card-pros-cons { flex-direction: column; gap: 4px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>物件ダッシュボード</h1>
  <div class="header-actions">
    <span class="status-text" id="status">毎朝7時に自動更新</span>
    <button class="btn btn-outline" id="btn-sync" title="いいねデータをGitHubに同期">同期</button>
    <button class="btn btn-outline" id="btn-export-likes" title="いいねデータをエクスポート">Export</button>
    <label class="btn btn-outline" style="cursor:pointer" title="いいねデータをインポート">Import<input type="file" id="btn-import-likes" accept=".json" style="display:none"></label>
  </div>
</div>

<div class="main">
  <div class="stats" id="stats"></div>

  <div class="filters">
    <div class="filters-row">
      <div class="filter-group">
        <label>家賃（万円）</label>
        <div style="display:flex;gap:4px;align-items:center">
          <input type="number" id="f-rent-min" placeholder="下限" step="0.5" min="0">
          <span style="color:var(--muted)">〜</span>
          <input type="number" id="f-rent-max" placeholder="上限" step="0.5">
        </div>
      </div>
      <div class="filter-group">
        <label>間取り</label>
        <select id="f-layout">
          <option value="">すべて</option>
          <option>ワンルーム</option><option>1K</option><option>1DK</option><option>1LDK</option><option>2K</option>
        </select>
      </div>
      <div class="filter-group">
        <label>スコア</label>
        <select id="f-score">
          <option value="">すべて</option>
          <option value="70">70+</option><option value="50">50+</option><option value="30">30+</option>
        </select>
      </div>
      <div class="filter-group">
        <label>サイト</label>
        <select id="f-source">
          <option value="">すべて</option>
          <option value="suumo">SUUMO</option><option value="chintai">CHINTAI</option>
          <option value="door">DOOR</option><option value="yahoo">Yahoo!</option>
          <option value="smocca">スモッカ</option><option value="homes">HOME'S</option>
          <option value="athome">athome</option><option value="athome会員">athome会員</option>
        </select>
      </div>
      <div class="filter-group">
        <label>面積(m2)</label>
        <div style="display:flex;gap:4px;align-items:center">
          <input type="number" id="f-area-min" placeholder="下限" step="1" min="0">
          <span style="color:var(--muted)">〜</span>
          <input type="number" id="f-area-max" placeholder="上限" step="1">
        </div>
      </div>
      <div class="filter-group">
        <label>築年数</label>
        <select id="f-age">
          <option value="">すべて</option>
          <option value="3">3年以内</option><option value="5">5年以内</option>
          <option value="10">10年以内</option><option value="15">15年以内</option>
          <option value="20">20年以内</option><option value="30">30年以内</option>
        </select>
      </div>
      <div class="filter-group">
        <label>&nbsp;</label>
        <button class="btn btn-outline" id="btn-reset" style="font-size:12px;padding:6px 14px">リセット</button>
      </div>
    </div>
    <div id="station-filter" style="margin-top:12px;display:none">
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:8px" id="station-toggle">
        駅で絞り込み <span style="font-size:10px" id="station-arrow">&#9660;</span>
        <span id="station-selected-count" style="font-size:11px;color:var(--accent);font-weight:700"></span>
      </label>
      <div id="station-checks" style="display:none;flex-wrap:wrap;gap:4px 8px;max-height:200px;overflow-y:auto;padding:8px 0"></div>
    </div>
    <div class="saved-filters" id="saved-filters"></div>
  </div>

  <div class="prefs-bar" id="prefs-bar">
    <span class="prefs-icon">&#10084;</span>
    <span class="prefs-text" id="prefs-text"></span>
  </div>

  <div class="toolbar">
    <div class="result-count" id="result-count"></div>
    <div class="sort-btns">
      <button class="sort-btn active" data-key="score" data-dir="desc">スコア高</button>
      <button class="sort-btn" data-key="total_rent" data-dir="asc">家賃安</button>
      <button class="sort-btn" data-key="total_rent" data-dir="desc">家賃高</button>
      <button class="sort-btn" data-key="area_sqm" data-dir="desc">広い</button>
      <button class="sort-btn" data-key="year_built_num" data-dir="desc">築浅</button>
      <button class="sort-btn" data-key="walk_min" data-dir="asc">駅近</button>
      <button class="sort-btn" data-key="scraped_at" data-dir="desc">新着</button>
    </div>
    <div class="per-page">
      <select id="per-page">
        <option value="10">10件</option><option value="20" selected>20件</option>
        <option value="50">50件</option><option value="999">全件</option>
      </select>
    </div>
  </div>

  <div class="cards" id="cards"></div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- Detail modal -->
<div class="overlay" id="overlay">
  <div class="detail" id="detail"></div>
</div>

<script>
let allData = [];
let filtered = [];
let sortKey = 'score', sortDir = 'desc';
let currentPage = 1;

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Station rank mapping
const STATION_RANKS = {
  S: ['北参道'],
  A: ['明治神宮前','渋谷','南新宿','代々木','表参道','国立競技場','原宿','代々木公園','参宮橋','初台','千駄ヶ谷','千駄ケ谷'],
  B: ['信濃町','六本木','神泉','代々木八幡','恵比寿','青山一丁目','幡ヶ谷','代官山','代々木上原'],
};
function getStationRank(stationStr) {
  if (!stationStr) return null;
  for (const [rank, stations] of Object.entries(STATION_RANKS)) {
    for (const st of stations) {
      if (stationStr.includes(st)) return rank;
    }
  }
  return 'C';
}
function rankBadge(rank) {
  if (!rank) return '';
  const labels = { S: 'S', A: 'A', B: 'B', C: 'C' };
  return `<span class="station-rank rank-${rank}">${labels[rank]}ランク</span>`;
}

// Colors
function scoreColor(s) {
  if (s >= 75) return '#34c759';
  if (s >= 55) return '#ff9500';
  if (s >= 35) return '#ff9500';
  return '#ff3b30';
}
function scoreBg(s) {
  if (s >= 75) return '#f0fdf4';
  if (s >= 55) return '#fffbeb';
  if (s >= 35) return '#fff7ed';
  return '#fef2f2';
}
function sourceColor(s) {
  const m = { suumo: '#22c55e', homes: '#3b82f6', athome: '#a855f7', chintai: '#f59e0b',
    door: '#06b6d4', yahoo: '#ef4444', smocca: '#ec4899', 'athome会員': '#8b5cf6' };
  return m[s] || '#6b7280';
}
function recBadge(r) {
  const m = {
    '強くおすすめ': ['#dcfce7','#166534'],
    'おすすめ': ['#dcfce7','#15803d'],
    '普通': ['#fef9c3','#854d0e'],
    '微妙': ['#fed7aa','#9a3412'],
    'おすすめしない': ['#fecaca','#991b1b'],
  };
  const [bg,c] = m[r] || ['#f3f4f6','#374151'];
  return `<span class="badge" style="background:${bg};color:${c}">${esc(r)}</span>`;
}
function rentText(yen) {
  const man = yen / 10000;
  return man % 1 === 0 ? man + '万円' : man.toFixed(1) + '万円';
}

// Extract station name from station_access string
function extractStations(stationStr) {
  if (!stationStr) return [];
  const stations = [];
  // Match patterns like "初台駅", "京王新線/初台駅 歩5分", "三軒茶屋/東急田園都市線"
  const parts = stationStr.split(/[/／]/);
  for (const part of parts) {
    const m = part.match(/「?([^\s「」]+?)」?駅/);
    if (m) {
      stations.push(m[1].replace(/^.*線\s*/, '').trim());
    }
  }
  // Also try simpler pattern for "○○駅 歩Xm" format
  if (stations.length === 0) {
    const m2 = stationStr.match(/([^\s/／]+?)駅/g);
    if (m2) {
      for (const s of m2) {
        const name = s.replace('駅', '').replace(/.*線\s*/, '').replace(/[「」]/g, '').trim();
        if (name && !stations.includes(name)) stations.push(name);
      }
    }
  }
  return stations;
}

let stationFilterOpen = false;
let selectedStations = new Set(); // empty = all

function buildStationFilter() {
  const container = $('#station-filter');
  const checks = $('#station-checks');
  if (!allData.length) { container.style.display = 'none'; return; }
  container.style.display = 'block';

  // Count stations
  const counts = {};
  for (const p of allData) {
    for (const st of extractStations(p.station_access)) {
      counts[st] = (counts[st] || 0) + 1;
    }
  }

  // Group by rank
  const rankGroups = { S: [], A: [], B: [], C: [] };
  const stationList = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  for (const [name, count] of stationList) {
    const rank = getStationRank(name + '駅') || getStationRank(name) || 'C';
    const actualRank = STATION_RANKS.S?.some(s => name.includes(s) || s.includes(name)) ? 'S'
      : STATION_RANKS.A?.some(s => name.includes(s) || s.includes(name)) ? 'A'
      : STATION_RANKS.B?.some(s => name.includes(s) || s.includes(name)) ? 'B' : 'C';
    rankGroups[actualRank].push([name, count]);
  }

  let html = '<div class="st-actions"><button onclick="selectAllStations()">すべて選択</button><button onclick="clearAllStations()">すべて解除</button><button onclick="selectRankStations(\'S\')">Sのみ</button><button onclick="selectRankStations(\'SA\')">S+A</button></div>';
  const rankLabels = { S: 'Sランク', A: 'Aランク', B: 'Bランク', C: 'その他' };
  const rankColors = { S: '#92400e', A: '#1e40af', B: '#374151', C: '#9ca3af' };
  for (const rank of ['S', 'A', 'B', 'C']) {
    if (rankGroups[rank].length === 0) continue;
    html += `<div class="st-section">${rankLabels[rank]}</div>`;
    for (const [name, count] of rankGroups[rank]) {
      const checked = selectedStations.size === 0 || selectedStations.has(name) ? 'checked' : '';
      html += `<label class="st-check"><input type="checkbox" value="${esc(name)}" ${checked} onchange="onStationChange()"><span>${esc(name)}</span><span class="st-rank" style="color:${rankColors[rank]}">${rank}</span><span class="st-count">(${count})</span></label>`;
    }
  }
  checks.innerHTML = html;
  updateStationCount();
}

// Store all station names for rank selection
function getAllStationNames() {

function selectAllStations() {

}
function clearAllStations() {
  selectedStations.clear();
  $('#station-checks').querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);

  onStationChange();
}
function selectRankStations(ranks) {
  const wantedRanks = ranks.split('');
  $('#station-checks').querySelectorAll('input[type=checkbox]').forEach(cb => {
    const rankEl = cb.parentElement.querySelector('.st-rank');
    const rank = rankEl ? rankEl.textContent.trim() : 'C';

function onStationChange() {
  const all = $('#station-checks').querySelectorAll('input[type=checkbox]');
  const checked = [...all].filter(cb => cb.checked);
  if (checked.length === all.length || checked.length === 0) {
    selectedStations.clear(); // all or none = no filter

    selectedStations = new Set(checked.map(cb => cb.value));

  updateStationCount();

function updateStationCount() {

// Likes Store (localStorage)
const LikesStore = {
  KEY: 'bukken-likes',
  _load() { try { return new Set(JSON.parse(localStorage.getItem(this.KEY)) || []); } catch { return new Set(); } },
  _save(s) { localStorage.setItem(this.KEY, JSON.stringify([...s])); },
  isLiked(url) { return this._load().has(url); },
  toggle(url) { const s = this._load(); const liked = !s.has(url); liked ? s.add(url) : s.delete(url); this._save(s); return liked; },
  getAll() { return this._load(); },
  export() { return [...this._load()]; },
  import(urls) { const s = this._load(); urls.forEach(u => s.add(u)); this._save(s); },
};

// Fetch
async function loadData() {
  const res = await fetch('data.json');
  allData = await res.json();
  // Merge localStorage likes
  const likes = LikesStore.getAll();
  allData.forEach(p => { p.liked = likes.has(p.url); });
  buildStationFilter();
  applyFilters();
  updatePrefsBar();
}

function renderStats() {

// Filters
function applyFilters() {
  const rentMin = parseFloat($('#f-rent-min').value) * 10000 || 0;
  const rentMax = parseFloat($('#f-rent-max').value) * 10000 || Infinity;
  const layout = $('#f-layout').value;
  const scoreMin = parseInt($('#f-score').value) || 0;
  const source = $('#f-source').value;
  const areaMin = parseFloat($('#f-area-min').value) || 0;
  const areaMax = parseFloat($('#f-area-max').value) || Infinity;
  const maxAge = parseInt($('#f-age').value) || 0;
  const currentYear = new Date().getFullYear();
  filtered = allData.filter(p => {
    if (p.total_rent < rentMin || p.total_rent > rentMax) return false;
    if (layout && !p.layout.includes(layout)) return false;
    if (p.score < scoreMin) return false;
    if (source && p.source !== source) return false;
    if (p.area_sqm < areaMin || p.area_sqm > areaMax) return false;
    if (maxAge > 0) {
      const yb = p.year_built || '';
      if (yb.includes('新築')) { /* pass */ }
      else {
        const m = yb.match(/(\d{4})/);
        if (!m || currentYear - parseInt(m[1]) > maxAge) return false;
      }
    }
    // Station filter
    if (selectedStations.size > 0) {
      const propStations = extractStations(p.station_access);
      if (!propStations.some(s => selectedStations.has(s))) return false;
    }
    return true;
  });
  currentPage = 1;
  applySort();
}

function getSortVal(p, key) {
  if (key === 'year_built_num') {
    // "2024年3月" -> 202403, "新築" -> 999999
    const yb = p.year_built || '';
    if (yb.includes('新築')) return 999999;
    const m = yb.match(/(\d{4})\D*(\d{1,2})?/);
    return m ? parseInt(m[1]) * 100 + parseInt(m[2] || '1') : 0;
  }
  if (key === 'walk_min') {
    // "初台駅 歩5分" -> 5
    const m = (p.station_access || '').match(/(\d+)\s*分/);
    return m ? parseInt(m[1]) : 99;
  }
  if (key === 'scraped_at') {
    return p.scraped_at || '0';
  }
  return p[key] || 0;
}

function applySort() {
  filtered.sort((a, b) => {
    const va = getSortVal(a, sortKey);
    const vb = getSortVal(b, sortKey);
    if (typeof va === 'string') {
      return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    return sortDir === 'asc' ? va - vb : vb - va;
  });
  renderStats();
  renderCards();
}

// Saved filter presets
const PRESETS_KEY = 'bukken-filter-presets';
let activePreset = null;

function getPresets() {
  try { return JSON.parse(localStorage.getItem(PRESETS_KEY)) || []; }
  catch { return []; }
}

function savePresets(presets) {
  localStorage.setItem(PRESETS_KEY, JSON.stringify(presets));
}

function getCurrentFilters() {
  return {
    rentMin: $('#f-rent-min').value,
    rentMax: $('#f-rent-max').value,
    layout: $('#f-layout').value,
    score: $('#f-score').value,
    source: $('#f-source').value,
    areaMin: $('#f-area-min').value,
    areaMax: $('#f-area-max').value,
    age: $('#f-age').value,
    stations: [...selectedStations],
  };
}

function applyPreset(preset) {
  $('#f-rent-min').value = preset.filters.rentMin || '';
  $('#f-rent-max').value = preset.filters.rentMax || '';
  $('#f-layout').value = preset.filters.layout || '';
  $('#f-score').value = preset.filters.score || '';
  $('#f-source').value = preset.filters.source || '';
  $('#f-area-min').value = preset.filters.areaMin || '';
  $('#f-area-max').value = preset.filters.areaMax || '';
  $('#f-age').value = preset.filters.age || '';
  const st = new Set(preset.filters.stations || []);
  if (st.size > 0) {
    selectedStations = st;
    $('#station-checks').querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.checked = selectedStations.has(cb.value);
    });
  } else {
    selectedStations.clear();
    $('#station-checks').querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true);
  }
  updateStationCount();
  activePreset = preset.name;
  renderPresets();
  applyFilters();
}

function deletePreset(name) {
  const presets = getPresets().filter(p => p.name !== name);
  savePresets(presets);
  if (activePreset === name) activePreset = null;
  renderPresets();
}

function saveNewPreset() {
  const name = prompt('条件名を入力してください:');
  if (!name || !name.trim()) return;
  const presets = getPresets().filter(p => p.name !== name.trim());
  presets.push({ name: name.trim(), filters: getCurrentFilters() });
  savePresets(presets);
  activePreset = name.trim();
  renderPresets();
}

function renderPresets() {
  const presets = getPresets();
  const container = $('#saved-filters');
  if (!presets.length) {
    container.innerHTML = '<button class="preset-save" onclick="saveNewPreset()">+ 条件を保存</button>';
    return;
  }
  let html = '';
  for (const p of presets) {
    const cls = activePreset === p.name ? 'preset-btn active' : 'preset-btn';
    html += `<button class="${cls}" onclick="applyPreset(${esc(JSON.stringify(JSON.stringify(p)))})">
      ${esc(p.name)}<span class="preset-del" onclick="event.stopPropagation();deletePreset(${esc(JSON.stringify(JSON.stringify(p.name)))})">&#10005;</span>
    </button>`;
  }
  html += '<button class="preset-save" onclick="saveNewPreset()">+ 保存</button>';
  container.innerHTML = html;
}

// Fix: applyPreset from inline onclick needs to parse JSON string
const _origApplyPreset = applyPreset;
applyPreset = function(arg) {
  if (typeof arg === 'string') arg = JSON.parse(arg);
  _origApplyPreset(arg);
};
const _origDeletePreset = deletePreset;
deletePreset = function(arg) {
  if (typeof arg === 'string') {
    try { arg = JSON.parse(arg); } catch {}
  }
  _origDeletePreset(arg);
};

renderPresets();

// Like (localStorage)
function toggleLike(idx) {
  const p = filtered[idx]; if (!p) return;
  const liked = LikesStore.toggle(p.url);
  p.liked = liked;
  const orig = allData.find(d => d.url === p.url);
  if (orig) orig.liked = liked;
  renderCards();
  renderStats();
  updatePrefsBar();
}

// Preferences (client-side computation)
function updatePrefsBar() {
  const liked = allData.filter(p => p.liked);
  const bar = $('#prefs-bar');
  if (liked.length === 0) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');

  const rents = liked.map(p => p.total_rent).filter(Boolean);
  const areas = liked.map(p => p.area_sqm).filter(Boolean);
  const layoutMap = {};
  liked.forEach(p => { if (p.layout) layoutMap[p.layout] = (layoutMap[p.layout] || 0) + 1; });
  const stationMap = {};
  liked.forEach(p => {
    if (!p.station_access) return;
    const m = p.station_access.match(/([^\s/]+駅)/);
    if (m) stationMap[m[1]] = (stationMap[m[1]] || 0) + 1;
  });

  const parts = [];
  if (rents.length) parts.push(`家賃${Math.round(Math.min(...rents)/10000)}〜${Math.round(Math.max(...rents)/10000)}万円`);
  if (areas.length) parts.push(`面積${Math.min(...areas)}〜${Math.max(...areas)}m2`);
  const topLayout = Object.entries(layoutMap).sort((a,b) => b[1]-a[1])[0];
  if (topLayout) parts.push(`${topLayout[0]}が好み`);
  const topStation = Object.entries(stationMap).sort((a,b) => b[1]-a[1])[0];
  if (topStation) parts.push(`${topStation[0]}周辺`);

  $('#prefs-text').innerHTML = `<span class="prefs-count">${liked.length}件いいね</span> &rarr; ${esc(parts.join('、') || '分析中...')}`;
}

// GitHub Sync
$('#btn-sync').addEventListener('click', async () => {
  const GH_TOKEN_KEY = 'bukken-gh-token';
  let token = localStorage.getItem(GH_TOKEN_KEY);
  if (!token) {
    token = prompt('GitHub Personal Access Token を入力 (fine-grained, contents:write):');
    if (!token) return;
    localStorage.setItem(GH_TOKEN_KEY, token);
  }
  const likes = LikesStore.export();
  try {
    $('#status').textContent = '同期中...';
    const res = await fetch('https://api.github.com/repos/Jun-Jun1120/bukken-scraper/dispatches', {
      method: 'POST',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ event_type: 'sync-likes', client_payload: { likes } }),
    });
    if (res.status === 204) {
      $('#status').textContent = `同期完了 (${likes.length}件)`;
    } else if (res.status === 401 || res.status === 403) {
      localStorage.removeItem(GH_TOKEN_KEY);
      $('#status').textContent = 'トークンが無効です。再試行してください';
    } else {
      $('#status').textContent = `同期失敗 (${res.status})`;
    }
  } catch (e) {
    $('#status').textContent = '同期エラー';
  }
  setTimeout(() => { $('#status').textContent = '毎朝7時に自動更新'; }, 5000);
});

// Export/Import Likes
$('#btn-export-likes').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(LikesStore.export(), null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'bukken-likes.json'; a.click();
});
$('#btn-import-likes').addEventListener('change', async (e) => {
  const file = e.target.files[0]; if (!file) return;
  const text = await file.text();
  try {
    const urls = JSON.parse(text);
    if (Array.isArray(urls)) {
      LikesStore.import(urls);
      allData.forEach(p => { p.liked = LikesStore.isLiked(p.url); });
      renderCards(); renderStats(); updatePrefsBar();
      $('#status').textContent = `${urls.length}件インポート完了`;
      setTimeout(() => { $('#status').textContent = '毎朝7時に自動更新'; }, 3000);
    }
  } catch { alert('JSONファイルが不正です'); }
  e.target.value = '';
});

// Init
loadData();
